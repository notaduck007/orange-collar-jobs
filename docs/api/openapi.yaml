      operationId: getPlatformStats
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformStats" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
