  # ── Batch ─────────────────────────────────────────────────────────────────

  /api/v1/jobs/batch:
    post:
      x-implemented: true
      tags: [Batch]
      summary: Ingest a batch of jobs
      description: |
        Accepts a batch of job records from scrapers or feed partners.

        **Sync mode** (≤100 jobs): processed inline; result returned immediately.
        **Async mode** (>100 jobs): enqueued via BullMQ; returns a `batchId` to poll.

        Supports two content types:
        - `application/json` — JSON payload with a `jobs` array
        - `multipart/form-data` — CSV file upload (one row per job, header required)

        **Deduplication**: jobs are matched by `externalId`. If a match is found
        and the content differs, the record is updated (`updated` counter). If
        identical, it is skipped (`skipped` counter).

        **Priority**: batch-ingested jobs rank below direct/vendor/api posts in
        search results (`sourceType` field controls ordering).
      operationId: ingestBatch
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BatchRequest" }
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file (UTF-8, header row required)
                source:
                  type: string
                  description: Human-readable batch label
      responses:
        "200":
          description: Sync result (batch ≤100 jobs, processed immediately)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchStatus" }
        "202":
          description: Async result (batch >100 jobs, queued for processing)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/UnprocessableEntity" }
        "429": { $ref: "#/components/responses/TooManyRequests" }

  /api/v1/jobs/batch/{batchId}/status:
    get:
      x-implemented: true
      tags: [Batch]
      summary: Poll batch status
      description: Returns processing progress for an async batch job.
      operationId: getBatchStatus
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Batch status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BatchStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

