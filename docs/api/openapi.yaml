          description: Application submitted
          content:
            application/json:
              schema:
                type: object
                required: [applicationId]
                properties:
                  applicationId: { type: string, format: uuid }
                  interviewBooked: { type: boolean }
                  interviewStartsAt: { type: string, format: date-time, nullable: true }
                  message: { type: string, example: "Application sent!" }
        "409":
          description: Already applied to this job
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }
