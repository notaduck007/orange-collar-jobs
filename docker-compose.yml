services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wj_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: warehousejobs
      POSTGRES_USER: wj_user
      POSTGRES_PASSWORD: wj_dev_password
    ports:
      - "5433:5432" # host 5433 — avoids conflict with other local Postgres on 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wj_user -d warehousejobs"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: wj_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6380:6379" # host 6380 — avoids conflict with other local Redis on 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: wj_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: wj_minio_user
      MINIO_ROOT_PASSWORD: wj_minio_dev_password
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO bucket initialiser (runs once, then exits) ──────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: wj_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 wj_minio_user wj_minio_dev_password &&
        mc mb --ignore-existing local/resumes &&
        mc mb --ignore-existing local/company-logos &&
        mc mb --ignore-existing local/ad-assets &&
        echo 'MinIO buckets ready'
      "

  # ── NestJS API (optional — run natively with `bun start:dev` during dev) ──
  api:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: wj_api
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      NODE_ENV: development
      PORT: "3001"
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://wj_user:wj_dev_password@postgres:5432/warehousejobs
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local_dev_jwt_secret_must_be_at_least_32_characters_long
      JWT_REFRESH_SECRET: local_dev_refresh_secret_at_least_32_chars_long
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY: wj_minio_user
      STORAGE_SECRET_KEY: wj_minio_dev_password
      STORAGE_BUCKET_RESUMES: resumes
      STORAGE_BUCKET_LOGOS: company-logos
      STORAGE_BUCKET_ADS: ad-assets
      STORAGE_FORCE_PATH_STYLE: "true"
      EMAIL_PROVIDER: resend
      EMAIL_API_KEY: re_local_dev_placeholder_key
      EMAIL_FROM: noreply@warehousejobs.com
      EMAIL_FROM_NAME: WarehouseJobs
      API_KEY_HASH: local_dev_placeholder_batch_api_key_hash
      LOG_LEVEL: debug
    ports:
      - "3001:3001"

volumes:
  postgres_data:
  redis_data:
  minio_data:
