name: Publish OpenAPI to SwaggerHub

# Runs automatically when docs/api/openapi.yaml changes on main, or manually via the
# Actions UI. Fails closed on contract drift BEFORE pushing anything to SwaggerHub.
# A push to main is a live publish; manual runs honor the dry_run input.
on:
  push:
    branches: [main]
    paths:
      - "docs/api/openapi.yaml"
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump the spec version before publishing (blank = publish the version already in the YAML)"
        type: choice
        options: ["", patch, minor, major]
        default: ""
      version:
        description: "Explicit version override (e.g. 1.2.0). Ignored when bump is set."
        required: false
        default: ""
      dry_run:
        description: "Dry run — validate and print intended actions, publish nothing"
        type: boolean
        default: false

concurrency:
  group: publish-swagger-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Validate and publish API contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      PORT: "3001"
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://contract_guard:contract_guard@localhost:5432/contract_guard
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_contract_guard_jwt_secret_min_32_chars
      JWT_REFRESH_SECRET: ci_contract_guard_refresh_secret_min_32
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: wj_minio_user
      STORAGE_SECRET_KEY: wj_minio_dev_password
      STORAGE_FORCE_PATH_STYLE: "true"
      EMAIL_API_KEY: re_contract_guard_key
      EMAIL_FROM: noreply@warehousejobs.com
      API_KEY_HASH: local_dev_placeholder_batch_api_key_hash
      LOG_LEVEL: debug

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify spec file exists
        run: |
          if [[ ! -f docs/api/openapi.yaml ]]; then
            echo "::error file=docs/api/openapi.yaml::OpenAPI spec not found"
            exit 1
          fi
          echo "Spec size: $(wc -c < docs/api/openapi.yaml) bytes"

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: src/api
        run: bun install --frozen-lockfile

      # --- Fail-closed contract gates (no secrets required) ---
      - name: Validate OpenAPI spec
        run: bun run api:validate

      - name: Contract drift guard (spec ↔ implemented routes)
        run: bun run api:contract:check

      # --- Decide dry-run vs live publish ---
      - name: Determine publish mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "dry_flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "::notice title=Publish mode::dry-run (nothing will be pushed)"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "dry_flag=" >> "$GITHUB_OUTPUT"
            echo "::notice title=Publish mode::live publish"
          fi

      # --- Version bump (manual only) ---
      - name: Bump API version
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.bump != '' &&
          inputs.dry_run != true
        run: bash scripts/bump-api-version.sh "${{ inputs.bump }}"

      - name: Build publish arguments
        id: args
        run: |
          ARGS="${{ steps.mode.outputs.dry_flag }}"
          if [[ -z "${{ inputs.bump }}" && -n "${{ inputs.version }}" ]]; then
            ARGS="${ARGS} --version ${{ inputs.version }}"
          fi
          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"

      - name: Publish to SwaggerHub
        env:
          SWAGGER_API_KEY: ${{ secrets.SWAGGER_API_KEY }}
        run: bash scripts/publish-swagger.sh ${{ steps.args.outputs.args }}

      - name: Annotate commit with SwaggerHub URL
        if: success()
        run: |
          VERSION=$(grep -m1 -E '^[[:space:]]*version:' docs/api/openapi.yaml | sed -E 's/.*version:[[:space:]]*//; s/["'"'"' ]//g')
          echo "::notice title=SwaggerHub Published::https://app.swaggerhub.com/apis/redbonzai/warehousejobs-api/${VERSION}"
