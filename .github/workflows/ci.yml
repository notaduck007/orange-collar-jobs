name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/api/**"
      - "docs/api/openapi.yaml"
      - "docker-compose.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/api/**"
      - "docs/api/openapi.yaml"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  WORKING_DIR: src/api
  # Prisma postinstall runs during bun install; migrate/test steps override with real URLs.
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_placeholder

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: ${{ env.WORKING_DIR }}
        run: bun run lint

      - name: Type check
        working-directory: ${{ env.WORKING_DIR }}
        run: bun run type-check

  # ────────────────────────────────────────────────────────────────────────────
  api-contract:
    name: API Contract Drift Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      # Fail closed: spec must be valid and match implemented NestJS routes
      # (operations marked x-implemented: true in docs/api/openapi.yaml).
      # No database, Redis, or MinIO required — contract:check stubs Prisma.
      - name: OpenAPI validate
        run: bun run api:validate

      - name: Contract drift guard (spec ↔ implemented routes)
        run: bun run api:contract:check
        env:
          NODE_ENV: test
          PORT: "3001"
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgresql://contract_guard:contract_guard@localhost:5432/contract_guard
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci_contract_guard_jwt_secret_min_32_chars
          JWT_REFRESH_SECRET: ci_contract_guard_refresh_secret_min_32
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: wj_minio_user
          STORAGE_SECRET_KEY: wj_minio_dev_password
          STORAGE_FORCE_PATH_STYLE: "true"
          EMAIL_API_KEY: re_contract_guard_key
          EMAIL_FROM: noreply@warehousejobs.com
          API_KEY_HASH: local_dev_placeholder_batch_api_key_hash
          LOG_LEVEL: debug

  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint-type-check, api-contract]
    env:
      NODE_ENV: test
      PORT: "3001"
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci_jwt_secret_min_32_chars_for_testing
      JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_testing
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: wj_minio_user
      STORAGE_SECRET_KEY: wj_minio_dev_password
      STORAGE_FORCE_PATH_STYLE: "true"
      EMAIL_API_KEY: test_email_key
      EMAIL_FROM: noreply@test.com
      API_KEY_HASH: local_dev_placeholder_batch_api_key_hash
      LOG_LEVEL: debug
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      - name: Run unit tests with coverage
        working-directory: ${{ env.WORKING_DIR }}
        run: bun run test:cov

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ${{ env.WORKING_DIR }}/coverage/

  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint-type-check, api-contract]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warehousejobs_test
          POSTGRES_USER: wj_user
          POSTGRES_PASSWORD: wj_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wj_user -d warehousejobs_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      - name: Run Prisma migrations on test DB
        working-directory: ${{ env.WORKING_DIR }}
        env:
          DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_test
        run: bun run db:migrate:deploy

      - name: Start MinIO and create buckets
        run: bash scripts/ci-minio-up.sh

      - name: Run integration tests
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CI_MINIO_READY: "true"
          NODE_ENV: test
          PORT: "3001"
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_test
          TEST_DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_test
          REDIS_URL: redis://localhost:6379
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: wj_minio_user
          STORAGE_SECRET_KEY: wj_minio_dev_password
          STORAGE_FORCE_PATH_STYLE: "true"
          JWT_SECRET: ci_jwt_secret_min_32_chars_for_testing
          JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_testing
          EMAIL_API_KEY: test_email_key
          EMAIL_FROM: noreply@test.com
          API_KEY_HASH: $2b$12$placeholder_hash_for_ci_testing
          LOG_LEVEL: debug
        run: bun run test:integration

  # ────────────────────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warehousejobs_e2e
          POSTGRES_USER: wj_user
          POSTGRES_PASSWORD: wj_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wj_user -d warehousejobs_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      - name: Run Prisma migrations
        working-directory: ${{ env.WORKING_DIR }}
        env:
          DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_e2e
        run: bun run db:migrate:deploy

      - name: Start MinIO and create buckets
        run: bash scripts/ci-minio-up.sh

      - name: Run E2E tests
        working-directory: ${{ env.WORKING_DIR }}
        env:
          CI_MINIO_READY: "true"
          NODE_ENV: test
          PORT: "3001"
          CORS_ORIGIN: http://localhost:5173
          DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_e2e
          TEST_DATABASE_URL: postgresql://wj_user:wj_dev_password@localhost:5432/warehousejobs_e2e
          REDIS_URL: redis://localhost:6379
          STORAGE_ENDPOINT: http://localhost:9000
          STORAGE_ACCESS_KEY: wj_minio_user
          STORAGE_SECRET_KEY: wj_minio_dev_password
          STORAGE_FORCE_PATH_STYLE: "true"
          JWT_SECRET: ci_jwt_secret_min_32_chars_for_testing
          JWT_REFRESH_SECRET: ci_refresh_secret_min_32_chars_testing
          EMAIL_API_KEY: test_email_key
          EMAIL_FROM: noreply@test.com
          API_KEY_HASH: $2b$12$placeholder_hash_for_ci_testing
          LOG_LEVEL: debug
        run: bun run test:e2e

  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: ${{ env.WORKING_DIR }}
        run: bun run build
